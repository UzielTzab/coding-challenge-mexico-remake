# Configuración de Redis optimizada para HFT (Pub/Sub)

# Deshabilitar persistencia pesada (AOF y RDB) ya que solo nos importa el estado en memoria para el Pub/Sub
save ""
appendonly no

# Ajustes de latencia y red
tcp-keepalive 60
tcp-backlog 511

# Max memory: el servidor es de uso exclusivo, pero limitamos para evitar OOM
maxmemory 512mb
maxmemory-policy allkeys-lru

# Optimización para Pub/Sub y eventos en tiempo real
# Desactivamos el guardado de logs que pueda retrasar los hilos
loglevel notice

# Desactivar protecciones que limitan la concurrencia en entornos dockerizados de confianza
protected-mode no
